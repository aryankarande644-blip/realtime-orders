<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrderStream — Live Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --accent:    #7c6af7;
      --accent2:   #00e5b0;
      --danger:    #ff4d6d;
      --text:      #e2e2f0;
      --muted:     #5a5a7a;
      --pending:   #f4a233;
      --shipped:   #7c6af7;
      --delivered: #00e5b0;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo .tag {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--accent2);
      text-transform: uppercase;
      border: 1px solid var(--accent2);
      padding: 2px 6px;
      border-radius: 3px;
    }

    /* Connection status pill */
    .conn-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      transition: all 0.3s;
    }

    .conn-status.connected { color: var(--accent2); border-color: var(--accent2); }
    .conn-status.disconnected { color: var(--danger); border-color: var(--danger); }
    .conn-status.reconnecting { color: var(--pending); border-color: var(--pending); }

    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .conn-status.connected .conn-dot { animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Stats row ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
    }

    .stat-card .label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .stat-card.total   .value { color: var(--text); }
    .stat-card.pending .value { color: var(--pending); }
    .stat-card.shipped .value { color: var(--shipped); }
    .stat-card.delivered .value { color: var(--delivered); }

    /* ── Layout ── */
    .main { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }

    @media (max-width: 800px) { .main { grid-template-columns: 1fr; } }

    /* ── Orders table ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .panel-header h2 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .panel-header .count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(124,106,247,0.05); }

    /* Flash animation for new/updated rows */
    tbody tr.flash-insert { animation: flashInsert 1s ease-out; }
    tbody tr.flash-update { animation: flashUpdate 1s ease-out; }
    tbody tr.flash-delete { animation: flashDelete 0.5s ease-out forwards; }

    @keyframes flashInsert {
      0%   { background: rgba(0,229,176,0.2); }
      100% { background: transparent; }
    }
    @keyframes flashUpdate {
      0%   { background: rgba(124,106,247,0.25); }
      100% { background: transparent; }
    }
    @keyframes flashDelete {
      0%   { opacity: 1; background: rgba(255,77,109,0.2); }
      100% { opacity: 0; height: 0; padding: 0; }
    }

    td {
      padding: 13px 16px;
      font-size: 14px;
      vertical-align: middle;
    }

    td.id-col {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    td.name-col { font-weight: 600; }

    td.product-col {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
    }

    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 4px;
    }

    .badge.pending   { background: rgba(244,162,51,0.15);  color: var(--pending);   border: 1px solid rgba(244,162,51,0.3); }
    .badge.shipped   { background: rgba(124,106,247,0.15); color: var(--shipped);   border: 1px solid rgba(124,106,247,0.3); }
    .badge.delivered { background: rgba(0,229,176,0.12);   color: var(--delivered); border: 1px solid rgba(0,229,176,0.25); }

    td.time-col {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    td.actions-col { text-align: right; white-space: nowrap; }

    .btn-sm {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-sm:hover { color: var(--text); border-color: var(--muted); }
    .btn-sm.delete:hover { color: var(--danger); border-color: var(--danger); }

    .empty-state {
      padding: 48px 24px;
      text-align: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }

    /* ── Sidebar ── */
    .sidebar { display: flex; flex-direction: column; gap: 20px; }

    /* New order form */
    .form-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .form-panel h3 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
      color: var(--text);
    }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .field input,
    .field select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .field input:focus,
    .field select:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      padding: 11px;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Activity log */
    .log-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .log-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .log-header h3 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .log-clear {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .log-clear:hover { color: var(--text); }

    .log-list {
      max-height: 260px;
      overflow-y: auto;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .log-entry {
      padding: 7px 16px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.5;
      animation: slideIn 0.2s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: none; }
    }

    .log-entry .log-time { color: var(--muted); margin-right: 6px; }
    .log-entry .log-op { font-weight: 600; margin-right: 4px; }
    .log-entry .log-op.INSERT { color: var(--accent2); }
    .log-entry .log-op.UPDATE { color: var(--accent); }
    .log-entry .log-op.DELETE { color: var(--danger); }
    .log-entry .log-msg { color: var(--text); }
    .log-entry .log-connected { color: var(--accent2); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">
        <h1>OrderStream</h1>
        <span class="tag">Live</span>
      </div>
      <div class="conn-status disconnected" id="connStatus">
        <span class="conn-dot"></span>
        <span id="connLabel">Connecting…</span>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card total">
        <div class="label">Total Orders</div>
        <div class="value" id="statTotal">—</div>
      </div>
      <div class="stat-card pending">
        <div class="label">Pending</div>
        <div class="value" id="statPending">—</div>
      </div>
      <div class="stat-card shipped">
        <div class="label">Shipped</div>
        <div class="value" id="statShipped">—</div>
      </div>
      <div class="stat-card delivered">
        <div class="label">Delivered</div>
        <div class="value" id="statDelivered">—</div>
      </div>
    </div>

    <div class="main">
      <!-- Orders table -->
      <div class="panel">
        <div class="panel-header">
          <h2>Orders</h2>
          <span class="count" id="orderCount">0 orders</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Customer</th>
              <th>Product</th>
              <th>Status</th>
              <th>Updated</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="6" class="empty-state">No orders yet. Create one →</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Create order form -->
        <div class="form-panel">
          <h3>New Order</h3>
          <div class="field">
            <label>Customer Name</label>
            <input type="text" id="fCustomer" placeholder="e.g. Priya Sharma" />
          </div>
          <div class="field">
            <label>Product Name</label>
            <input type="text" id="fProduct" placeholder="e.g. Laptop Stand" />
          </div>
          <div class="field">
            <label>Status</label>
            <select id="fStatus">
              <option value="pending">Pending</option>
              <option value="shipped">Shipped</option>
              <option value="delivered">Delivered</option>
            </select>
          </div>
          <button class="btn-primary" id="btnCreate">Create Order</button>
        </div>

        <!-- Activity log -->
        <div class="log-panel">
          <div class="log-header">
            <h3>Activity Log</h3>
            <button class="log-clear" id="btnClearLog">CLEAR</button>
          </div>
          <div class="log-list" id="logList">
            <div class="log-entry"><span class="log-time">—</span><span class="log-msg">Waiting for events…</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    let orders = [];

    // ── DOM refs ─────────────────────────────────────────────────────────────
    const connStatus  = document.getElementById("connStatus");
    const connLabel   = document.getElementById("connLabel");
    const ordersBody  = document.getElementById("ordersBody");
    const orderCount  = document.getElementById("orderCount");
    const logList     = document.getElementById("logList");
    const btnCreate   = document.getElementById("btnCreate");
    const fCustomer   = document.getElementById("fCustomer");
    const fProduct    = document.getElementById("fProduct");
    const fStatus     = document.getElementById("fStatus");

    // ── Stat counters ─────────────────────────────────────────────────────────
    function updateStats() {
      const counts = { pending: 0, shipped: 0, delivered: 0 };
      orders.forEach(o => counts[o.status]++);
      document.getElementById("statTotal").textContent     = orders.length;
      document.getElementById("statPending").textContent   = counts.pending;
      document.getElementById("statShipped").textContent   = counts.shipped;
      document.getElementById("statDelivered").textContent = counts.delivered;
      orderCount.textContent = `${orders.length} order${orders.length !== 1 ? 's' : ''}`;
    }

    // ── Render table ──────────────────────────────────────────────────────────
    function renderOrders(flashId = null, flashType = null) {
      if (orders.length === 0) {
        ordersBody.innerHTML = `<tr><td colspan="6" class="empty-state">No orders yet. Create one →</td></tr>`;
        updateStats(); return;
      }

      ordersBody.innerHTML = orders.map(o => `
        <tr id="row-${o.id}" class="${flashId === o.id ? 'flash-' + flashType.toLowerCase() : ''}">
          <td class="id-col">#${o.id}</td>
          <td class="name-col">${esc(o.customer_name)}</td>
          <td class="product-col">${esc(o.product_name)}</td>
          <td><span class="badge ${o.status}">${o.status}</span></td>
          <td class="time-col">${fmtTime(o.updated_at)}</td>
          <td class="actions-col">
            <button class="btn-sm" onclick="cycleStatus(${o.id}, '${o.status}')">advance</button>
            <button class="btn-sm delete" onclick="deleteOrder(${o.id})">✕</button>
          </td>
        </tr>
      `).join('');

      updateStats();
    }

    // ── WebSocket ─────────────────────────────────────────────────────────────
    let ws, reconnectTimer;

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);

      ws.onopen = () => {
        setConnStatus('connected', 'Live');
      };

      ws.onmessage = (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch { return; }

        if (msg.type === 'CONNECTED') {
          log('connected', null, `Connected as client ${msg.clientId}`);
          loadOrders(); // fetch current snapshot
          return;
        }

        if (msg.type === 'ORDER_CHANGE') {
          handleChange(msg);
        }
      };

      ws.onclose = () => {
        setConnStatus('reconnecting', 'Reconnecting…');
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        setConnStatus('disconnected', 'Error');
      };
    }

    function handleChange({ operation, data }) {
      const row = data.new ?? data.old;
      if (!row) return;

      log(operation, row, null);

      if (operation === 'INSERT') {
        orders.unshift(row);
        renderOrders(row.id, 'INSERT');
      } else if (operation === 'UPDATE') {
        const idx = orders.findIndex(o => o.id === row.id);
        if (idx !== -1) orders[idx] = row; else orders.unshift(row);
        renderOrders(row.id, 'UPDATE');
      } else if (operation === 'DELETE') {
        // Flash the row then remove
        const tr = document.getElementById(`row-${row.id}`);
        if (tr) {
          tr.classList.add('flash-delete');
          setTimeout(() => {
            orders = orders.filter(o => o.id !== row.id);
            renderOrders();
          }, 480);
        } else {
          orders = orders.filter(o => o.id !== row.id);
          renderOrders();
        }
      }
    }

    // ── REST helpers ──────────────────────────────────────────────────────────
    async function loadOrders() {
      try {
        const res = await fetch('/api/orders');
        orders = await res.json();
        renderOrders();
      } catch (e) {
        console.error('Failed to load orders:', e);
      }
    }

    btnCreate.addEventListener('click', async () => {
      const customer_name = fCustomer.value.trim();
      const product_name  = fProduct.value.trim();
      const status        = fStatus.value;

      if (!customer_name || !product_name) {
        fCustomer.focus(); return;
      }

      btnCreate.disabled = true;
      try {
        await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ customer_name, product_name, status }),
        });
        fCustomer.value = '';
        fProduct.value  = '';
        fStatus.value   = 'pending';
      } finally {
        btnCreate.disabled = false;
      }
    });

    // Allow Enter key in the form
    [fCustomer, fProduct].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') btnCreate.click(); });
    });

    window.cycleStatus = async (id, current) => {
      const cycle = { pending: 'shipped', shipped: 'delivered', delivered: 'pending' };
      const next = cycle[current];
      await fetch(`/api/orders/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: next }),
      });
    };

    window.deleteOrder = async (id) => {
      await fetch(`/api/orders/${id}`, { method: 'DELETE' });
    };

    // ── Activity log ──────────────────────────────────────────────────────────
    const opIcons = { INSERT: '＋', UPDATE: '↻', DELETE: '✕' };

    function log(operation, row, customMsg) {
      const first = logList.querySelector('.log-entry');
      if (first?.textContent.includes('Waiting')) first.remove();

      const entry = document.createElement('div');
      entry.className = 'log-entry';

      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      if (customMsg) {
        entry.innerHTML = `<span class="log-time">${time}</span><span class="log-connected">${customMsg}</span>`;
      } else {
        const icon = opIcons[operation] || '·';
        const msg = row
          ? `${icon} Order #${row.id} — ${row.customer_name} / ${row.product_name} [${row.status ?? 'deleted'}]`
          : `${icon} Unknown`;

        entry.innerHTML = `<span class="log-time">${time}</span><span class="log-op ${operation}">${operation}</span><span class="log-msg">${esc(msg)}</span>`;
      }

      logList.prepend(entry);

      // Keep log at max 50 entries
      while (logList.children.length > 50) logList.lastChild.remove();
    }

    document.getElementById('btnClearLog').addEventListener('click', () => {
      logList.innerHTML = '<div class="log-entry"><span class="log-time">—</span><span class="log-msg">Log cleared.</span></div>';
    });

    // ── Utilities ─────────────────────────────────────────────────────────────
    function setConnStatus(cls, label) {
      connStatus.className = 'conn-status ' + cls;
      connLabel.textContent = label;
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtTime(ts) {
      if (!ts) return '—';
      const d = new Date(ts);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    connect();
  </script>
</body>
</html>
